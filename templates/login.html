{% extends 'base.html' %}
{% block title %}Sign in · Family Recipe Book{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>Sign in</h1>
    <p class="muted">Enter your username and password.</p>
    <form method="post" action="{{ url_for('login') }}">
        <label>
            Username
            <input type="text" name="username" required autofocus
                   value="{{ form.username or '' }}"
                   pattern="[A-Za-z0-9_.-]{2,80}"
                   title="2-80 letters, numbers, dot, dash, underscore">
        </label>
        <label>
            Password
            <input type="password" name="password" required>
        </label>
        <button class="button" type="submit">Sign in</button>
    </form>
    <p class="muted small">
        New here? <a href="{{ url_for('signup') }}">Create an account</a>.
    </p>
</section>
{% endblock %}
