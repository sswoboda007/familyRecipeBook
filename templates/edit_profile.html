{% extends 'base.html' %}
{% block title %}Edit profile · Family Recipe Book{% endblock %}

{% block content %}
<section class="form-card">
    <h1>Edit your profile</h1>
    <form method="post" action="{{ url_for('edit_profile') }}">
        <label>
            Display name
            <input type="text" name="display_name" maxlength="120"
                   value="{{ user.display_name or '' }}">
        </label>
        <label>
            Bio
            <textarea name="bio" rows="4">{{ user.bio or '' }}</textarea>
        </label>
        <div class="form-actions">
            <button class="button" type="submit">Save</button>
            <a class="button button-ghost"
               href="{{ url_for('profile', username=user.username) }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
