{% extends 'base.html' %}
{% block title %}Sign up · Family Recipe Book{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>Create your account</h1>
    <p class="muted">Anyone is welcome. Pick a username and password to get started.</p>
    <form method="post" action="{{ url_for('signup') }}">
        <label>
            Username
            <input type="text" name="username" required autofocus
                   value="{{ form.username or '' }}"
                   pattern="[A-Za-z0-9_.-]{2,80}"
                   title="2-80 letters, numbers, dot, dash, underscore">
        </label>
        <label>
            Display name <span class="muted small">(optional)</span>
            <input type="text" name="display_name" maxlength="120"
                   value="{{ form.display_name or '' }}">
        </label>
        <label>
            Password <span class="muted small">(at least 6 characters)</span>
            <input type="password" name="password" required minlength="6">
        </label>
        <label>
            Confirm password
            <input type="password" name="confirm_password" required minlength="6">
        </label>
        <button class="button" type="submit">Create account</button>
    </form>
    <p class="muted small">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>.
    </p>
</section>
{% endblock %}
